AWSTemplateFormatVersion: "2010-09-09"
Description: "AWS Cloudformation template for a CICD PR (Pull Request)"

Parameters:
  Environment:
    Type: String
    Default: test
    AllowedValues: 
      - test
      - staging
      - production

Resources:
  MyS3Bucket:
    Type: "AWS::S3::Bucket"
    Properties:
      BucketName: !Sub "${AWS::StackName}-${Environment}-bucket"
      Tags:
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BucketName:
    Description: "Name of S3 bucket that was created"
    Value: !Ref MyS3Bucket


